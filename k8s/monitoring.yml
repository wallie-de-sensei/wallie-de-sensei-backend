apiVersion: v1
kind: ServiceMonitor
metadata:
  name: wallie-backend-metrics
  namespace: wallie-de-sensei
  labels:
    app: wallie-backend
spec:
  selector:
    matchLabels:
      app: wallie-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: wallie-backend-alerts
  namespace: wallie-de-sensei
  labels:
    app: wallie-backend
spec:
  groups:
  - name: wallie-backend
    interval: 30s
    rules:
    # High error rate
    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate detected"
        description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.instance }}"
    
    # High response time
    - alert: HighResponseTime
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High response time detected"
        description: "95th percentile response time is {{ $value }}s for {{ $labels.instance }}"
    
    # Pod not ready
    - alert: PodNotReady
      expr: kube_pod_status_ready{condition="false", namespace="wallie-de-sensei", pod=~"wallie-backend.*"} == 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is not ready"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been unready for more than 5 minutes"
    
    # High memory usage
    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"wallie-backend.*"} / container_spec_memory_limit_bytes{pod=~"wallie-backend.*"} > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage detected"
        description: "Memory usage is {{ $value | humanizePercentage }} for {{ $labels.pod }}"
    
    # High CPU usage
    - alert: HighCPUUsage
      expr: rate(container_cpu_usage_seconds_total{pod=~"wallie-backend.*"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage detected"
        description: "CPU usage is {{ $value | humanizePercentage }} for {{ $labels.pod }}"
    
    # Database connection errors
    - alert: DatabaseConnectionErrors
      expr: rate(database_connection_errors_total[5m]) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Database connection errors detected"
        description: "{{ $value }} database connection errors per second"
    
    # Redis connection errors
    - alert: RedisConnectionErrors
      expr: rate(redis_connection_errors_total[5m]) > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Redis connection errors detected"
        description: "{{ $value }} Redis connection errors per second"
